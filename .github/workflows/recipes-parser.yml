# Workflow «Рецепты и питание» — публикация на сайт + Telegram.
# Контент: рецепты и здоровое питание (источник только для парсинга, в публичных данных не упоминается).
# Telegram: фото блюда + структурированный пост (⏱️ время, 🛒 продукты с ценами по сетям России и т.д.).
# На сайт: полная статья. Запуск: 17:25 МСК (14:25 UTC) 1 раз в день.

name: 🍽️ Рецепты и питание

on:
  schedule:
    - cron: '25 14 * * *'   # 14:25 UTC (17:25 МСК) — рецепты и питание, НА САЙТ + Telegram
  workflow_dispatch:

jobs:
  parse-and-publish:
    name: Парсинг и публикация рецептов и здорового питания
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      checks: read
      pull-requests: read

    steps:
      - name: Клонирование репозитория fitness-timer-autopost
        uses: actions/checkout@v4
        with:
          path: fitness-timer-autopost

      - name: Клонирование репозитория tabatatimer-ru (public_html)
        uses: actions/checkout@v4
        with:
          repository: VR-Lounge/tabatatimer-ru
          path: public_html
          token: ${{ secrets.PAT_CROSS_REPO || secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Установка Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Установка зависимостей
        working-directory: fitness-timer-autopost
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Установка AWS CLI для Яндекс Cloud
        working-directory: fitness-timer-autopost
        run: |
          pip install awscli

      - name: Восстановление состояния (cache)
        uses: actions/cache/restore@v4
        with:
          path: |
            fitness-timer-autopost/.womenshealth_processed.json
            fitness-timer-autopost/.content_hashes.json
            fitness-timer-autopost/content_library.json
            fitness-timer-autopost/.telegram_recent.json
            fitness-timer-autopost/.publication_logs.json
            fitness-timer-autopost/.skinnyms_queue.json
          key: recipes-state-${{ github.run_id }}
          restore-keys: |
            recipes-state-

      - name: Создание структуры директорий
        run: |
          mkdir -p public_html/blog
          echo "✅ Структура директорий создана"

      - name: Запуск парсера рецептов и публикация
        working-directory: fitness-timer-autopost
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          YANDEX_ACCESS_KEY_ID: ${{ secrets.YANDEX_ACCESS_KEY_ID }}
          YANDEX_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_SECRET_ACCESS_KEY }}
          PUBLISH_TO_BLOG: "true"
          RECIPES_ONLY: "true"
          SKINNYMS_CATEGORIES: "recipes,meal-planning"
          SKINNYMS_MAX_ARTICLES_PER_RUN: "40"
        run: |
          python3 skinnyms_parser.py
          python3 womenshealth_parser.py

      - name: Коммит библиотеки релевантного контента
        if: always()
        working-directory: fitness-timer-autopost
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_CROSS_REPO || secrets.GITHUB_TOKEN }}
        run: |
          if [ -f content_library.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/VR-Lounge/fitness-timer-autopost.git
            git add content_library.json
            if git diff --cached --quiet; then
              echo "ℹ️ Библиотека не изменилась"
            else
              git commit -m "📚 Рецепты: обновление библиотеки контента $(date +'%Y-%m-%d %H:%M:%S')" || echo "⚠️ Нет изменений для коммита"
              if git push origin main; then
                echo "✅ Библиотека контента отправлена в fitness-timer-autopost"
              else
                echo "⚠️ Не удалось отправить библиотеку контента"
              fi
            fi
          else
            echo "ℹ️ content_library.json не найден, пропускаю коммит"
          fi

      - name: Генерация HTML страниц для блога
        working-directory: fitness-timer-autopost
        run: |
          python3 generate_blog_post_page.py

      - name: Загрузка файлов блога на Яндекс Cloud
        working-directory: fitness-timer-autopost
        env:
          YANDEX_ACCESS_KEY_ID: ${{ secrets.YANDEX_ACCESS_KEY_ID }}
          YANDEX_SECRET_ACCESS_KEY: ${{ secrets.YANDEX_SECRET_ACCESS_KEY }}
        run: |
          chmod +x upload_blog_to_yandex.sh
          ./upload_blog_to_yandex.sh || echo "⚠️ Загрузка на Яндекс Cloud пропущена (переменные не настроены)"

      - name: Коммит изменений в репозиторий tabatatimer-ru
        working-directory: public_html
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_CROSS_REPO || secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/VR-Lounge/tabatatimer-ru.git

          if [ -n "$(git status --porcelain)" ]; then
            git add blog-posts.json blog/*.html sitemap.xml robots.txt images/blog/ 2>/dev/null || true
            git commit -m "🤖 Рецепты: автообновление блога $(date +'%Y-%m-%d %H:%M:%S')" || echo "⚠️ Нет изменений для коммита"
            if git push origin main; then
              echo "✅ Изменения успешно отправлены в tabatatimer-ru"
            else
              echo "⚠️ Не удалось запушить изменения в tabatatimer-ru"
            fi
          else
            echo "ℹ️ Нет изменений для коммита"
          fi

      - name: Сохранение состояния (cache)
        uses: actions/cache/save@v4
        if: always()
        with:
          path: |
            fitness-timer-autopost/.womenshealth_processed.json
            fitness-timer-autopost/.content_hashes.json
            fitness-timer-autopost/content_library.json
            fitness-timer-autopost/.telegram_recent.json
            fitness-timer-autopost/.publication_logs.json
            fitness-timer-autopost/.skinnyms_queue.json
          key: recipes-state-${{ github.run_id }}

      - name: Логирование результата
        if: always()
        working-directory: fitness-timer-autopost
        run: |
          echo "📊 Результат выполнения парсера рецептов:"
          if [ -f .womenshealth_processed.json ]; then
            echo "✅ Состояние публикации сохранено"
          fi
